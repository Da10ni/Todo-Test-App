name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          TOTAL=$(echo "$FILES" | wc -l)
          TS_COUNT=$(echo "$FILES" | grep -c '\.jsx\?$\|\.tsx\?$' || true)
          CONFIG_COUNT=$(echo "$FILES" | grep -c '\.json$\|\.yml$\|\.yaml$\|\.config' || true)
          CSS_COUNT=$(echo "$FILES" | grep -c '\.css$' || true)

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "ts_count=$TS_COUNT" >> $GITHUB_OUTPUT
          echo "config_count=$CONFIG_COUNT" >> $GITHUB_OUTPUT
          echo "css_count=$CSS_COUNT" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Security scan
        id: security
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }})

          SECRETS=$(echo "$DIFF" | grep -ciE '(sk_live|sk_test|password\s*=\s*["\x27][^\x27"]+["\x27]|api_key\s*=)' || true)
          CONSOLE_LOGS=$(echo "$DIFF" | grep -c 'console\.log' || true)
          TODOS=$(echo "$DIFF" | grep -ciE '(TODO|FIXME|HACK)' || true)

          echo "secrets=$SECRETS" >> $GITHUB_OUTPUT
          echo "console_logs=$CONSOLE_LOGS" >> $GITHUB_OUTPUT
          echo "todos=$TODOS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Architecture check
        id: arch
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }})

          INLINE_STYLES=$(echo "$DIFF" | grep -c 'style={{' || true)
          DIRECT_FETCH=$(echo "$DIFF" | grep -cE '(fetch\(|axios\.)' || true)

          echo "inline_styles=$INLINE_STYLES" >> $GITHUB_OUTPUT
          echo "direct_fetch=$DIRECT_FETCH" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const security = {
              secrets: parseInt('${{ steps.security.outputs.secrets }}') || 0,
              consoleLogs: parseInt('${{ steps.security.outputs.console_logs }}') || 0,
              todos: parseInt('${{ steps.security.outputs.todos }}') || 0,
            };

            const arch = {
              inlineStyles: parseInt('${{ steps.arch.outputs.inline_styles }}') || 0,
              directFetch: parseInt('${{ steps.arch.outputs.direct_fetch }}') || 0,
            };

            const files = {
              total: parseInt('${{ steps.files.outputs.total }}') || 0,
              ts: parseInt('${{ steps.files.outputs.ts_count }}') || 0,
              config: parseInt('${{ steps.files.outputs.config_count }}') || 0,
              css: parseInt('${{ steps.files.outputs.css_count }}') || 0,
            };

            const securityIcon = security.secrets > 0 ? '🔴' : '🟢';
            const archIcon = (arch.inlineStyles > 5 || arch.directFetch > 0) ? '🟡' : '🟢';

            const body = `## 🤖 AI Code Review

            ### Security Scan ${securityIcon}
            | Check | Count | Status |
            |-------|-------|--------|
            | Hardcoded secrets | ${security.secrets} | ${security.secrets > 0 ? '🔴 FAIL' : '✅ Pass'} |
            | console.log statements | ${security.consoleLogs} | ${security.consoleLogs > 5 ? '⚠️ Review' : '✅ OK'} |
            | TODO/FIXME/HACK comments | ${security.todos} | ${security.todos > 0 ? '📝 Note' : '✅ Clean'} |

            ### Architecture Check ${archIcon}
            | Check | Count | Status |
            |-------|-------|--------|
            | Inline styles | ${arch.inlineStyles} | ${arch.inlineStyles > 5 ? '⚠️ Prefer Tailwind classes' : '✅ OK'} |
            | Direct fetch/axios calls | ${arch.directFetch} | ${arch.directFetch > 0 ? '⚠️ Consider using an API client' : '✅ OK'} |

            ### File Summary
            | Category | Count |
            |----------|-------|
            | Total files changed | ${files.total} |
            | JS/JSX/TS/TSX | ${files.ts} |
            | Config files | ${files.config} |
            | CSS files | ${files.css} |

            ### Review Checklist
            - [ ] Code logic is correct and handles edge cases
            - [ ] No breaking changes introduced
            - [ ] Auth/permissions are properly enforced (if applicable)
            - [ ] Changes match the PR description

            ---
            *Automated review by AI Code Review Bot*`;

            // Delete previous bot comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const comment of comments.data) {
              if (comment.body.includes('🤖 AI Code Review')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.replace(/^ +/gm, ''),
            });
